<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title Slide</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    :root {
      --color-surface: #0d1117;
      --color-surface-foreground: #e6edf3;
      --color-primary: #58a6ff;
      --color-secondary: #f78166;
      --color-muted: #161b22;
      --color-muted-foreground: #8b949e;
      --color-accent: #d29922;
      --color-border: #30363d;
    }
  </style>
  <script src="scale.js" defer></script>
  <script src="nav.js" defer></script>
</head>
<body class="col" style="width: 960px; height: 540px; background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1e24 100%); position: relative;">
  
  <!-- Left accent bar -->
  <div style="position: absolute; left: 0; top: 0; width: 8px; height: 100%; background: linear-gradient(180deg, #58a6ff 0%, #f78166 100%);"></div>
  
  <!-- Main content centered -->
  <div class="col center fill-height" style="padding: 40px 60px 40px 80px;">
    
    <!-- Badge -->
    <div style="margin-bottom: 24px;">
      <p style="margin: 0; padding: 6px 16px; background: rgba(88, 166, 255, 0.15); border: 1px solid #58a6ff; border-radius: 20px; font-size: 12px; color: #58a6ff; letter-spacing: 1px; display: inline-block;">AUTONOMOUS CONSTRUCTION • MULTI-AGENT SYSTEMS</p>
    </div>
    
    <!-- Title -->
    <div style="width: 100%; text-align: center;">
      <h1 style="margin: 0 0 8px 0; font-size: 36px; color: #e6edf3; font-weight: 700; line-height: 1.2;">AutoSelf Consistent Multi-Agent System</h1>
      <p style="margin: 0; font-size: 22px; color: #f78166; font-weight: 600;">for Autonomous Extraterrestrial Construction</p>
    </div>
    
    <!-- Authors -->
    <div style="margin-top: 40px; text-align: center;">
      <p style="margin: 0 0 8px 0; font-size: 16px; color: #e6edf3;">
        <strong>Ruslan Magaña Vsevolodovna</strong><span style="color: #8b949e; font-size: 13px; vertical-align: super;">1</span>
        <span style="color: #8b949e; margin: 0 12px;">•</span>
        <strong>Melodie Yashar</strong><span style="color: #8b949e; font-size: 13px; vertical-align: super;">2</span>
      </p>
      <p style="margin: 8px 0 0 0; font-size: 13px; color: #8b949e;">
        <span style="color: #58a6ff;">1</span> Independent Researcher, Milan, Italy
        <span style="margin: 0 8px;">|</span>
        <span style="color: #58a6ff;">2</span> AENARA, Los Angeles, USA
      </p>
    </div>
    
  </div>
  
  <!-- Bottom decoration -->
  <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #58a6ff 0%, #f78166 50%, #d29922 100%);"></div>
  
</body>
</html>
